  <main class="lower-main">
    <div class="lower-heading-group">
      <h2>お問い合わせ</h2>
      <p>ご不明点などがあれば、お気軽にお問い合わせください。</p>
    </div>
    <form class="form-box"
      action="https://api.staticforms.dev/submit"
      method="POST">

  <input type="hidden"
         name="accessKey"
         value="sf_2556b8d66755dbaf95016f3f">

  <input type="hidden"
       name="redirectTo"
       value="https://www.sus.ac.jp/">

  <div class="form-item">
    <label for="name">お名前</label>
    <input type="text"
           id="name"
           name="name"
           placeholder="例）山田太郎"
           required>
  </div>

  <div class="form-item">
    <label for="email">メールアドレス</label>
    <input type="email"
           id="email"
           name="email"
           placeholder="example@example.com"
           required>
  </div>

  <div class="form-item">
    <label for="message">お問い合わせ内容</label>

    <textarea id="message"
              name="message"
              rows="7"
              placeholder="お問い合わせ内容をご入力ください。"
              required></textarea>
  </div>

  <div class="form-item">
    <button type="submit">送信する</button>
  </div>

</form>
